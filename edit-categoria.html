<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Categoria — DashUnicev</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="dash.css">
</head>
<body>
<div class="dashboard-container">
  <main class="content">
    <div class="header-content">
      <h2><i class="fa-solid fa-pen-to-square"></i> Editar Categoria</h2>
      <p id="subtitulo">Carregando...</p>
    </div>

    <section class="card-form">
      <div id="alerta" style="display:none"></div>

      <div class="form-group">
        <label>Nome da Categoria</label>
        <input type="text" id="nome">
      </div>
      <div class="form-group">
        <label>Descrição</label>
        <input type="text" id="descricao">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="status">
          <option value="Ativo">Ativo</option>
          <option value="Inativo">Inativo</option>
        </select>
      </div>

      <div class="form-actions">
        <button class="btn-save" onclick="salvar()">
          <i class="fa-solid fa-floppy-disk"></i> Salvar Alterações
        </button>
        <a href="categorias.html" class="btn-cancel">
          <i class="fa-solid fa-xmark"></i> Cancelar
        </a>
      </div>
    </section>
  </main>
</div>

<script src="db.js"></script>
<script src="menu.js"></script>
<script>
  const id = new URLSearchParams(location.search).get('id');
  if (!id) window.location.href = 'categorias.html';

  const cat = DB.getCategoria(id);
  if (!cat) window.location.href = 'categorias.html';

  document.getElementById('nome').value      = cat.nome;
  document.getElementById('descricao').value = cat.descricao || '';
  document.getElementById('subtitulo').textContent = `Editando: ${cat.nome}`;
  document.getElementById('status').value    = cat.status;

  function salvar() {
    const nome      = document.getElementById('nome').value.trim();
    const descricao = document.getElementById('descricao').value.trim();
    const status    = document.getElementById('status').value;
    if (!nome) {
      document.getElementById('alerta').innerHTML =
        `<div class="alert alert-danger"><i class="fa-solid fa-circle-exclamation"></i> O nome é obrigatório.</div>`;
      document.getElementById('alerta').style.display = 'block';
      return;
    }
    DB.editarCategoria(id, { nome, descricao, status });
    window.location.href = 'categorias.html?msg=editado';
  }
</script>
</body>
</html>
