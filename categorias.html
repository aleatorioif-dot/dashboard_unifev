<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias — DashUnicev</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="dash.css">
</head>
<body>
<div class="dashboard-container">
  <main class="content">
    <div class="header-content" style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <h2><i class="fa-solid fa-folder"></i> Categorias</h2>
        <p>Organize as categorias das postagens.</p>
      </div>
      <a href="cad-categorias.html" class="btn-save">
        <i class="fa-solid fa-plus"></i> Nova Categoria
      </a>
    </div>

    <div id="alerta" style="display:none"></div>

    <div class="table-responsive">
      <table>
        <thead>
          <tr><th>Nº</th><th>Nome</th><th>Descrição</th><th>Status</th><th>Criado</th><th>Ações</th></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="db.js"></script>
<script src="menu.js"></script>
<script>
  const msgs = {
    editado:  ['success', 'fa-check-circle',    'Categoria atualizada!'],
    excluido: ['danger',  'fa-trash-can',        'Categoria excluída.'],
    cadastro: ['success', 'fa-check-circle',     'Categoria cadastrada!'],
    status:   ['warning', 'fa-circle-info',      'Status alterado.'],
  };
  const p = new URLSearchParams(location.search).get('msg');
  if (p && msgs[p]) {
    const [tipo, icone, texto] = msgs[p];
    document.getElementById('alerta').innerHTML =
      `<div class="alert alert-${tipo}"><i class="fa-solid ${icone}"></i> ${texto}</div>`;
    document.getElementById('alerta').style.display = 'block';
    history.replaceState({}, '', 'categorias.html');
    setTimeout(() => document.getElementById('alerta').style.display = 'none', 3500);
  }

  function render() {
    const lista = DB.getCategorias();
    document.getElementById('tbody').innerHTML = lista.length
      ? lista.map((c, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${c.nome}</td>
          <td style="color:var(--muted)">${c.descricao || '—'}</td>
          <td><span class="badge ${c.status === 'Ativo' ? 'ativa' : 'inativa'}">${c.status}</span></td>
          <td>${c.criado || '—'}</td>
          <td>
            <a href="edit-categoria.html?id=${c.id}" class="btn-icon" title="Editar"><i class="fa-solid fa-pen"></i></a>
            <button class="btn-icon" title="Alternar status" onclick="toggleStatus(${c.id})"><i class="fa-solid fa-eye"></i></button>
            <button class="btn-icon danger" title="Excluir" onclick="excluir(${c.id}, '${c.nome.replace(/'/g,"\\'")}')"><i class="fa-solid fa-trash"></i></button>
          </td>
        </tr>`).join('')
      : '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--muted)">Nenhuma categoria encontrada.</td></tr>';
  }

  function toggleStatus(id) { DB.toggleStatusCategoria(id); render(); }

  function excluir(id, nome) {
    if (!confirm(`Deseja excluir a categoria "${nome}"?`)) return;
    DB.excluirCategoria(id);
    render();
  }

  render();
</script>
</body>
</html>
