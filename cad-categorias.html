<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Categoria — DashUnicev</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="dash.css">
</head>
<body>
<div class="dashboard-container">
  <main class="content">
    <div class="header-content">
      <h2><i class="fa-solid fa-folder-plus"></i> Nova Categoria</h2>
      <p>Preencha os dados para criar uma nova categoria.</p>
    </div>

    <section class="card-form">
      <div id="alerta" style="display:none"></div>

      <div class="form-group">
        <label>Nome da Categoria</label>
        <input type="text" id="nome" placeholder="Ex: Notícias">
      </div>
      <div class="form-group">
        <label>Descrição</label>
        <input type="text" id="descricao" placeholder="Breve descrição (opcional)">
      </div>

      <div class="form-actions">
        <button class="btn-save" onclick="salvar()">
          <i class="fa-solid fa-floppy-disk"></i> Salvar
        </button>
        <a href="categorias.html" class="btn-cancel">
          <i class="fa-solid fa-xmark"></i> Cancelar
        </a>
      </div>
    </section>
  </main>
</div>

<script src="db.js"></script>
<script src="menu.js"></script>
<script>
  function salvar() {
    const nome     = document.getElementById('nome').value.trim();
    const descricao = document.getElementById('descricao').value.trim();
    if (!nome) {
      document.getElementById('alerta').innerHTML =
        `<div class="alert alert-danger"><i class="fa-solid fa-circle-exclamation"></i> O nome é obrigatório.</div>`;
      document.getElementById('alerta').style.display = 'block';
      return;
    }
    DB.criarCategoria({ nome, descricao });
    window.location.href = 'categorias.html?msg=cadastro';
  }
</script>
</body>
</html>
