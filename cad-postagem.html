<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Postagem — DashUnicev</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="dash.css">
</head>
<body>
<div class="dashboard-container">
  <main class="content">
    <div class="header-content">
      <h2><i class="fa-solid fa-pen-nib"></i> Nova Postagem</h2>
      <p>Preencha o título e o conteúdo da publicação.</p>
    </div>

    <section class="card-form">
      <div id="alerta" style="display:none"></div>

      <div class="form-group">
        <label>Título</label>
        <input type="text" id="titulo" placeholder="Título da postagem">
      </div>
      <div class="form-group">
        <label>Conteúdo</label>
        <textarea id="conteudo" placeholder="Escreva o conteúdo aqui..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Categoria</label>
          <select id="id_cat"><option value="">— Selecione —</option></select>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-save" onclick="salvar()">
          <i class="fa-solid fa-floppy-disk"></i> Publicar
        </button>
        <a href="postagens.html" class="btn-cancel">
          <i class="fa-solid fa-xmark"></i> Cancelar
        </a>
      </div>
    </section>
  </main>
</div>

<script src="db.js"></script>
<script src="menu.js"></script>
<script>
  // Popula o select de categorias
  const sel = document.getElementById('id_cat');
  DB.getCategorias().filter(c => c.status === 'Ativo').forEach(c => {
    sel.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
  });

  function salvar() {
    const titulo   = document.getElementById('titulo').value.trim();
    const conteudo = document.getElementById('conteudo').value.trim();
    const id_cat   = document.getElementById('id_cat').value;
    if (!titulo || !conteudo) {
      document.getElementById('alerta').innerHTML =
        `<div class="alert alert-danger"><i class="fa-solid fa-circle-exclamation"></i> Título e conteúdo são obrigatórios.</div>`;
      document.getElementById('alerta').style.display = 'block';
      return;
    }
    DB.criarPostagem({ titulo, conteudo, id_cat });
    window.location.href = 'postagens.html?msg=cadastro';
  }
</script>
</body>
</html>
